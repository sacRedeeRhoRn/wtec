<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" role="img" aria-label="wtec workflow pipeline">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="box1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#11998e"/>
    </linearGradient>
    <linearGradient id="box2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#11998e"/>
      <stop offset="100%" stop-color="#38ef7d"/>
    </linearGradient>
    <linearGradient id="box3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a6e"/>
      <stop offset="100%" stop-color="#8360c3"/>
    </linearGradient>
    <linearGradient id="box4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8360c3"/>
      <stop offset="100%" stop-color="#e91e8c"/>
    </linearGradient>
    <linearGradient id="box5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e91e8c"/>
      <stop offset="100%" stop-color="#f5576c"/>
    </linearGradient>
    <linearGradient id="arr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38ef7d" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#e91e8c" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="220" fill="url(#bg)"/>

  <!-- Pipeline boxes: 5 stages, evenly spaced -->
  <!-- Box 1: Crystal -->
  <g transform="translate(38,68)">
    <rect width="152" height="84" rx="14" fill="url(#box1)" opacity="0.18" stroke="#38ef7d" stroke-width="1" stroke-opacity="0.4"/>
    <!-- crystal lattice dots -->
    <g fill="#38ef7d" fill-opacity="0.55">
      <circle cx="40" cy="24" r="3.5"/><circle cx="76" cy="24" r="3.5"/><circle cx="112" cy="24" r="3.5"/>
      <circle cx="58" cy="44" r="3.5"/><circle cx="94" cy="44" r="3.5"/><circle cx="130" cy="44" r="3.5"/>
      <circle cx="40" cy="64" r="3.5"/><circle cx="76" cy="64" r="3.5"/><circle cx="112" cy="64" r="3.5"/>
    </g>
    <line x1="40" y1="24" x2="76" y2="24" stroke="#38ef7d" stroke-opacity="0.3" stroke-width="1"/>
    <line x1="76" y1="24" x2="112" y2="24" stroke="#38ef7d" stroke-opacity="0.3" stroke-width="1"/>
    <line x1="58" y1="44" x2="94" y2="44" stroke="#38ef7d" stroke-opacity="0.3" stroke-width="1"/>
    <line x1="40" y1="24" x2="58" y2="44" stroke="#38ef7d" stroke-opacity="0.3" stroke-width="1"/>
    <line x1="76" y1="24" x2="94" y2="44" stroke="#38ef7d" stroke-opacity="0.3" stroke-width="1"/>
    <line x1="112" y1="24" x2="130" y2="44" stroke="#38ef7d" stroke-opacity="0.3" stroke-width="1"/>
    <text x="76" y="78" font-size="11" fill="#7af5c0" font-family="monospace" text-anchor="middle">crystal</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="192" y1="110" x2="228" y2="110" stroke="url(#arr)" stroke-width="2"/>
  <polygon points="228,110 218,105 218,115" fill="#38ef7d" opacity="0.6"/>

  <!-- Box 2: SIESTA DFT -->
  <g transform="translate(230,68)">
    <rect width="152" height="84" rx="14" fill="url(#box2)" opacity="0.15" stroke="#38ef7d" stroke-width="1" stroke-opacity="0.35"/>
    <!-- SCF spiral suggestion -->
    <path d="M 76,22 C 100,22 110,36 110,50 C 110,65 98,74 76,74 C 54,74 42,65 42,50 C 42,36 52,27 66,26"
          fill="none" stroke="#38ef7d" stroke-width="2.5" stroke-opacity="0.55" stroke-linecap="round"/>
    <circle cx="76" cy="50" r="5" fill="#11998e" fill-opacity="0.7"/>
    <text x="76" y="78" font-size="11" fill="#7af5c0" font-family="monospace" text-anchor="middle">SIESTA DFT</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="384" y1="110" x2="420" y2="110" stroke="url(#arr)" stroke-width="2"/>
  <polygon points="420,110 410,105 410,115" fill="#8360c3" opacity="0.7"/>

  <!-- Box 3: Wannier90 -->
  <g transform="translate(422,68)">
    <rect width="152" height="84" rx="14" fill="url(#box3)" opacity="0.18" stroke="#8360c3" stroke-width="1" stroke-opacity="0.45"/>
    <!-- Wannier orbital blobs -->
    <ellipse cx="55" cy="42" rx="22" ry="14" fill="none" stroke="#a78bfa" stroke-width="2" stroke-opacity="0.6"/>
    <ellipse cx="97" cy="42" rx="22" ry="14" fill="none" stroke="#a78bfa" stroke-width="2" stroke-opacity="0.6"/>
    <ellipse cx="76" cy="58" rx="18" ry="11" fill="none" stroke="#c4b5fd" stroke-width="1.5" stroke-opacity="0.5"/>
    <circle cx="76" cy="42" r="4" fill="#8360c3" opacity="0.8"/>
    <text x="76" y="78" font-size="11" fill="#c4b5fd" font-family="monospace" text-anchor="middle">Wannier90</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="576" y1="110" x2="612" y2="110" stroke="url(#arr)" stroke-width="2"/>
  <polygon points="612,110 602,105 602,115" fill="#e91e8c" opacity="0.65"/>

  <!-- Box 4: H(R) → Kwant -->
  <g transform="translate(614,68)">
    <rect width="152" height="84" rx="14" fill="url(#box4)" opacity="0.15" stroke="#e91e8c" stroke-width="1" stroke-opacity="0.4"/>
    <!-- Matrix / Hamiltonian grid hint -->
    <g fill="none" stroke="#e91e8c" stroke-opacity="0.5" stroke-width="1">
      <rect x="28" y="18" width="40" height="40" rx="3"/>
      <line x1="28" y1="31" x2="68" y2="31"/>
      <line x1="28" y1="44" x2="68" y2="44"/>
      <line x1="41" y1="18" x2="41" y2="58"/>
      <line x1="54" y1="18" x2="54" y2="58"/>
    </g>
    <!-- arrow to Kwant leads -->
    <line x1="72" y1="38" x2="108" y2="38" stroke="#f093fb" stroke-width="2" stroke-opacity="0.7"/>
    <polygon points="108,38 99,33 99,43" fill="#f093fb" opacity="0.7"/>
    <line x1="108" y1="28" x2="128" y2="28" stroke="#4facfe" stroke-width="2" stroke-opacity="0.6"/>
    <line x1="108" y1="48" x2="128" y2="48" stroke="#4facfe" stroke-width="2" stroke-opacity="0.6"/>
    <text x="76" y="78" font-size="11" fill="#f093fb" font-family="monospace" text-anchor="middle">H(R) → Kwant</text>
  </g>

  <!-- Arrow 4→5 -->
  <line x1="768" y1="110" x2="804" y2="110" stroke="url(#arr)" stroke-width="2"/>
  <polygon points="804,110 794,105 794,115" fill="#f5576c" opacity="0.7"/>

  <!-- Box 5: Outputs -->
  <g transform="translate(806,68)">
    <rect width="356" height="84" rx="14" fill="url(#box5)" opacity="0.12" stroke="#f5576c" stroke-width="1" stroke-opacity="0.4"/>
    <!-- ρ(d) curve schematic -->
    <g transform="translate(20,10)">
      <line x1="0" y1="64" x2="80" y2="64" stroke="#888" stroke-width="1" opacity="0.5"/>
      <line x1="0" y1="64" x2="0" y2="4" stroke="#888" stroke-width="1" opacity="0.5"/>
      <path d="M 4,20 C 20,28 50,50 74,60" fill="none" stroke="#a8edea" stroke-width="2.5"/>
      <path d="M 4,55 C 20,50 50,35 74,18" fill="none" stroke="#cccccc" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
    </g>
    <!-- C(kz) staircase -->
    <g transform="translate(120,10)">
      <line x1="0" y1="64" x2="90" y2="64" stroke="#888" stroke-width="1" opacity="0.5"/>
      <line x1="0" y1="64" x2="0" y2="4" stroke="#888" stroke-width="1" opacity="0.5"/>
      <polyline points="2,60 20,60 20,40 40,40 40,20 60,20 60,40 80,40 80,60 88,60"
                fill="none" stroke="#f5576c" stroke-width="2.5" stroke-linejoin="round"/>
    </g>
    <!-- score bar -->
    <g transform="translate(228,18)">
      <rect x="0" y="0" width="100" height="16" rx="8" fill="#1a0a3d" opacity="0.7"/>
      <rect x="0" y="0" width="72" height="16" rx="8" fill="#f5576c" opacity="0.6"/>
      <rect x="0" y="24" width="100" height="16" rx="8" fill="#1a0a3d" opacity="0.7"/>
      <rect x="0" y="24" width="55" height="16" rx="8" fill="#a8edea" opacity="0.55"/>
    </g>
    <text x="178" y="78" font-size="11" fill="#f5a0aa" font-family="monospace" text-anchor="middle">ρ(d) · C(k_z) · score</text>
  </g>

  <!-- Sub-labels under boxes -->
  <text x="114" y="175" font-size="10" fill="#446655" font-family="monospace" text-anchor="middle">structure</text>
  <text x="306" y="175" font-size="10" fill="#446655" font-family="monospace" text-anchor="middle">SCF + SOC</text>
  <text x="498" y="175" font-size="10" fill="#446655" font-family="monospace" text-anchor="middle">HR · disentangle</text>
  <text x="690" y="175" font-size="10" fill="#446655" font-family="monospace" text-anchor="middle">slab · leads</text>
  <text x="984" y="175" font-size="10" fill="#446655" font-family="monospace" text-anchor="middle">transport · topology · report</text>

  <!-- top pipeline label -->
  <text x="600" y="30" font-size="12" fill="#334455" font-family="monospace" text-anchor="middle" letter-spacing="3">DFT  →  WANNIER  →  TIGHT-BINDING  →  TRANSPORT</text>
</svg>
