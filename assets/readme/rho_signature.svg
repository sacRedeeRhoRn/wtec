<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="wtec rho-d three-curve topological transport signature">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07060f"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="pristineG" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a8edea"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>
    <linearGradient id="defectG" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f093fb"/>
      <stop offset="100%" stop-color="#f5576c"/>
    </linearGradient>
    <linearGradient id="fitLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a8edea" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4facfe" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- ── Left panel: ρ(d) ───────────────────────────────── -->
  <g transform="translate(60,30)">
    <!-- axis box -->
    <line x1="70" y1="240" x2="480" y2="240" stroke="#2a2a4a" stroke-width="1.5"/>
    <line x1="70" y1="240" x2="70" y2="20" stroke="#2a2a4a" stroke-width="1.5"/>
    <!-- axis arrows -->
    <polygon points="480,240 467,234 467,246" fill="#2a2a4a"/>
    <polygon points="70,20 64,33 76,33" fill="#2a2a4a"/>
    <!-- axis labels -->
    <text x="488" y="244" font-size="14" fill="#4a4a6a" font-family="monospace" font-style="italic">d</text>
    <text x="55" y="18" font-size="14" fill="#4a4a6a" font-family="monospace" font-style="italic">ρ</text>

    <!-- grid lines (faint) -->
    <line x1="70" y1="200" x2="480" y2="200" stroke="#151530" stroke-width="1"/>
    <line x1="70" y1="160" x2="480" y2="160" stroke="#151530" stroke-width="1"/>
    <line x1="70" y1="120" x2="480" y2="120" stroke="#151530" stroke-width="1"/>
    <line x1="70" y1="80"  x2="480" y2="80"  stroke="#151530" stroke-width="1"/>
    <line x1="150" y1="20" x2="150" y2="240" stroke="#151530" stroke-width="1"/>
    <line x1="235" y1="20" x2="235" y2="240" stroke="#151530" stroke-width="1"/>
    <line x1="320" y1="20" x2="320" y2="240" stroke="#151530" stroke-width="1"/>
    <line x1="405" y1="20" x2="405" y2="240" stroke="#151530" stroke-width="1"/>

    <!-- Fuchs-Sondheimer: increasing (trivial metal) -->
    <path d="M 85,220 C 150,200 250,140 460,60"
          fill="none" stroke="#cccccc" stroke-width="2" stroke-dasharray="8,5" opacity="0.55"/>

    <!-- Pristine topological: decreasing (arc-dominated) -->
    <path d="M 85,65 C 160,90 270,165 460,218"
          fill="none" stroke="url(#pristineG)" stroke-width="3.5" filter="url(#glow)"/>

    <!-- Defect: higher, less decreasing -->
    <path d="M 85,80 C 160,107 270,172 460,222"
          fill="none" stroke="url(#defectG)" stroke-width="2.5" opacity="0.85"/>

    <!-- data point dots on pristine curve -->
    <g fill="#a8edea" filter="url(#glow)">
      <circle cx="110"  cy="70" r="4"/>
      <circle cx="183"  cy="105" r="4"/>
      <circle cx="256"  cy="145" r="4"/>
      <circle cx="330"  cy="178" r="4"/>
      <circle cx="400"  cy="205" r="4"/>
      <circle cx="455"  cy="217" r="4"/>
    </g>
    <!-- defect dots -->
    <g fill="#f5576c" opacity="0.75">
      <circle cx="110"  cy="85" r="3.5"/>
      <circle cx="183"  cy="119" r="3.5"/>
      <circle cx="256"  cy="158" r="3.5"/>
      <circle cx="330"  cy="188" r="3.5"/>
      <circle cx="400"  cy="214" r="3.5"/>
      <circle cx="455"  cy="222" r="3.5"/>
    </g>

    <!-- legend color swatches (no text) -->
    <line x1="80" y1="262" x2="110" y2="262" stroke="url(#pristineG)" stroke-width="3.5"/>
    <circle cx="95" cy="262" r="4" fill="#a8edea"/>
    <line x1="145" y1="262" x2="175" y2="262" stroke="url(#defectG)" stroke-width="2.5"/>
    <circle cx="160" cy="262" r="3.5" fill="#f5576c"/>
    <line x1="210" y1="262" x2="240" y2="262" stroke="#cccccc" stroke-width="2" stroke-dasharray="5,3" opacity="0.6"/>

    <!-- tiny labels -->
    <text x="275" y="266" font-size="10" fill="#445" font-family="monospace">pristine · defect · trivial-ref</text>

    <!-- panel title -->
    <text x="275" y="12" font-size="11" fill="#2a3a4a" font-family="monospace" text-anchor="middle">ρ(d)</text>
  </g>

  <!-- ── Right panel: σ_sq(d) two-channel fit ──────────── -->
  <g transform="translate(640,30)">
    <!-- axes -->
    <line x1="70" y1="240" x2="480" y2="240" stroke="#2a2a4a" stroke-width="1.5"/>
    <line x1="70" y1="240" x2="70" y2="20" stroke="#2a2a4a" stroke-width="1.5"/>
    <polygon points="480,240 467,234 467,246" fill="#2a2a4a"/>
    <polygon points="70,20 64,33 76,33" fill="#2a2a4a"/>
    <text x="488" y="244" font-size="14" fill="#4a4a6a" font-family="monospace" font-style="italic">d</text>
    <text x="45" y="18" font-size="12" fill="#4a4a6a" font-family="monospace">σ_sq</text>

    <!-- grid -->
    <line x1="70" y1="200" x2="480" y2="200" stroke="#151530" stroke-width="1"/>
    <line x1="70" y1="160" x2="480" y2="160" stroke="#151530" stroke-width="1"/>
    <line x1="70" y1="120" x2="480" y2="120" stroke="#151530" stroke-width="1"/>
    <line x1="70" y1="80"  x2="480" y2="80"  stroke="#151530" stroke-width="1"/>

    <!-- pristine conductance: G = σ_arc + σ_bulk·d  (linear, intercept > 0) -->
    <path d="M 85,215 C 200,188 340,150 460,115"
          fill="none" stroke="url(#pristineG)" stroke-width="2.5" opacity="0.6"/>
    <!-- fit line (dashed) -->
    <line x1="85" y1="220" x2="460" y2="112" stroke="#a8edea" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>

    <!-- defect conductance: lower intercept -->
    <path d="M 85,228 C 200,206 340,175 460,148"
          fill="none" stroke="url(#defectG)" stroke-width="2.5" opacity="0.6"/>
    <line x1="85" y1="232" x2="460" y2="146" stroke="#f093fb" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.45"/>

    <!-- σ_arc intercept annotations -->
    <!-- pristine intercept dot on y-axis extrapolation -->
    <line x1="70" y1="220" x2="85" y2="220" stroke="#a8edea" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
    <circle cx="70" cy="220" r="4" fill="#a8edea" opacity="0.7"/>
    <!-- defect intercept -->
    <line x1="70" y1="232" x2="85" y2="232" stroke="#f093fb" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
    <circle cx="70" cy="232" r="3.5" fill="#f093fb" opacity="0.6"/>

    <!-- bracket showing σ_arc difference -->
    <line x1="58" y1="220" x2="58" y2="232" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
    <line x1="54" y1="220" x2="62" y2="220" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
    <line x1="54" y1="232" x2="62" y2="232" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
    <text x="35" y="228" font-size="9" fill="#8888aa" font-family="monospace">Δσ_arc</text>

    <!-- data points -->
    <g fill="#a8edea" filter="url(#glow)">
      <circle cx="110"  cy="213" r="4"/>
      <circle cx="183"  cy="197" r="4"/>
      <circle cx="256"  cy="178" r="4"/>
      <circle cx="330"  cy="158" r="4"/>
      <circle cx="400"  cy="138" r="4"/>
      <circle cx="455"  cy="120" r="4"/>
    </g>
    <g fill="#f5576c" opacity="0.75">
      <circle cx="110"  cy="226" r="3.5"/>
      <circle cx="183"  cy="212" r="3.5"/>
      <circle cx="256"  cy="196" r="3.5"/>
      <circle cx="330"  cy="179" r="3.5"/>
      <circle cx="400"  cy="163" r="3.5"/>
      <circle cx="455"  cy="151" r="3.5"/>
    </g>

    <!-- panel title -->
    <text x="275" y="12" font-size="11" fill="#2a3a4a" font-family="monospace" text-anchor="middle">σ_sq = σ_arc + σ_bulk · d</text>
  </g>
</svg>
