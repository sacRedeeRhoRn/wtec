<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" role="img" aria-label="wtec Chern number profile and Weyl node topology">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="100%" stop-color="#0e1020"/>
    </linearGradient>
    <linearGradient id="chernUp" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5576c"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>
    <linearGradient id="bzFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a0a20" stop-opacity="0"/>
      <stop offset="50%" stop-color="#1a1a40" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0a0a20" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)"/>

  <!-- ── Left panel: C(k_z) staircase ─────────────────── -->
  <g transform="translate(50,30)">
    <!-- BZ background -->
    <rect x="65" y="20" width="420" height="210" rx="4" fill="url(#bzFill)"/>

    <!-- axes -->
    <line x1="65" y1="225" x2="490" y2="225" stroke="#2a2a4a" stroke-width="1.5"/>
    <line x1="65" y1="225" x2="65" y2="15" stroke="#2a2a4a" stroke-width="1.5"/>
    <polygon points="490,225 477,219 477,231" fill="#2a2a4a"/>
    <polygon points="65,15 59,28 71,28" fill="#2a2a4a"/>

    <!-- zero line -->
    <line x1="65" y1="125" x2="490" y2="125" stroke="#222244" stroke-width="1" stroke-dasharray="5,4"/>

    <!-- C=+1, +2 level guides -->
    <line x1="65" y1="85" x2="490" y2="85" stroke="#1a1a35" stroke-width="1"/>
    <line x1="65" y1="165" x2="490" y2="165" stroke="#1a1a35" stroke-width="1"/>
    <text x="50" y="130" font-size="11" fill="#333355" font-family="monospace" text-anchor="end">0</text>
    <text x="50" y="90" font-size="11" fill="#333355" font-family="monospace" text-anchor="end">+2</text>
    <text x="50" y="170" font-size="11" fill="#333355" font-family="monospace" text-anchor="end">−2</text>

    <!-- Chern staircase for TaP: W1 nodes ~0.38, W2 nodes ~0.62 (each pair gives ±1 jump) -->
    <!-- Path: kz=0→0.35: C=0 | 0.35→0.38: +1 | 0.38→0.42: +2 | 0.42→0.58: +2 | 0.58→0.62: +1 | 0.62→0.65: 0 | 0.65→1: 0 -->
    <!-- (scaled to x: kz ∈[0,1] → x ∈[80,475]) -->
    <!-- x = 80 + kz*395 -->
    <!-- C=0 at kz=0 → kz=0.35: x=80 to x=218 at y=125 -->
    <!-- C=+1: kz=0.35→0.38: x=218 to x=230 at y=85 shifted: actually staircase goes 0→+1→+2→+1→-1→-2→-1→0 for Weyl semimetal with chiral charge ±1 pairs -->
    <!-- Let me simplify for clarity: C(kz) starts at 0, jumps +1 at first W1 node, +1 again at second W1 node, then -1 at W2, -1 again = 0 at kz=1 -->
    <!-- But the figure should show non-trivial C=+2 region between W1 and W2 node pairs -->

    <!-- Staircase: 0 → +1(W1a at kz=0.32) → +2(W1b at kz=0.38) → plateau → −1 step(W2a at kz=0.62) → −2 step(W2b at kz=0.68) = 0 -->
    <!-- x_kz = 80 + kz*395 -->
    <!-- W1a: kz=0.32 → x=206; W1b: kz=0.38 → x=230; W2a: kz=0.62 → x=325; W2b: kz=0.68 → x=348 -->
    <polyline
      points="80,125  206,125  206,85  230,85  230,45  325,45  325,85  348,85  348,125  475,125"
      fill="none" stroke="#f5576c" stroke-width="3" stroke-linejoin="round" filter="url(#glow)"
    />

    <!-- Weyl node vertical dashes -->
    <line x1="206" y1="225" x2="206" y2="125" stroke="#4facfe" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
    <line x1="230" y1="225" x2="230" y2="45"  stroke="#4facfe" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
    <line x1="325" y1="225" x2="325" y2="45"  stroke="#4facfe" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
    <line x1="348" y1="225" x2="348" y2="125" stroke="#4facfe" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

    <!-- Weyl node dots on kz axis -->
    <circle cx="206" cy="225" r="5" fill="#4facfe" filter="url(#glow)" opacity="0.9"/>
    <circle cx="230" cy="225" r="5" fill="#f5576c" filter="url(#glow)" opacity="0.9"/>
    <circle cx="325" cy="225" r="5" fill="#f5576c" filter="url(#glow)" opacity="0.9"/>
    <circle cx="348" cy="225" r="5" fill="#4facfe" filter="url(#glow)" opacity="0.9"/>

    <!-- chirality labels -->
    <text x="206" y="242" font-size="10" fill="#4facfe" font-family="monospace" text-anchor="middle">+</text>
    <text x="230" y="242" font-size="10" fill="#f5576c" font-family="monospace" text-anchor="middle">+</text>
    <text x="325" y="242" font-size="10" fill="#f5576c" font-family="monospace" text-anchor="middle">−</text>
    <text x="348" y="242" font-size="10" fill="#4facfe" font-family="monospace" text-anchor="middle">−</text>

    <!-- axis labels -->
    <text x="497" y="229" font-size="13" fill="#445" font-family="monospace" font-style="italic">k_z</text>
    <text x="50" y="14"  font-size="13" fill="#445" font-family="monospace" font-style="italic">C</text>
    <text x="80" y="242" font-size="10" fill="#333355" font-family="monospace">0</text>
    <text x="468" y="242" font-size="10" fill="#333355" font-family="monospace">1</text>

    <!-- panel label -->
    <text x="277" y="10" font-size="11" fill="#223" font-family="monospace" text-anchor="middle">Chern profile  C(k_z)</text>
  </g>

  <!-- ── Right panel: BZ surface with Weyl projections and arc ─ -->
  <g transform="translate(640,30)">
    <!-- BZ hexagon (surface BZ approximated as rectangle with corners) -->
    <polygon points="60,20 490,20 510,120 490,220 60,220 40,120"
             fill="none" stroke="#1a1a40" stroke-width="1.5"/>
    <rect x="60" y="20" width="430" height="200" fill="#080814" rx="0" opacity="0.4"/>

    <!-- k_x / k_y axes -->
    <line x1="275" y1="20" x2="275" y2="220" stroke="#1a1a30" stroke-width="1" stroke-dasharray="3,4"/>
    <line x1="60" y1="120" x2="490" y2="120" stroke="#1a1a30" stroke-width="1" stroke-dasharray="3,4"/>

    <!-- Weyl node projections (W1 pair: upper half-BZ, W2 pair: lower half-BZ) -->
    <!-- W1+ -->
    <circle cx="210" cy="75" r="8" fill="#4facfe" opacity="0.85" filter="url(#softglow)"/>
    <circle cx="210" cy="75" r="4" fill="#4facfe"/>
    <text x="210" y="72" font-size="10" fill="white" text-anchor="middle" font-family="monospace">+</text>
    <!-- W1- -->
    <circle cx="340" cy="75" r="8" fill="#f5576c" opacity="0.85" filter="url(#softglow)"/>
    <circle cx="340" cy="75" r="4" fill="#f5576c"/>
    <text x="340" y="72" font-size="10" fill="white" text-anchor="middle" font-family="monospace">−</text>
    <!-- W2+ -->
    <circle cx="340" cy="165" r="8" fill="#4facfe" opacity="0.75" filter="url(#softglow)"/>
    <circle cx="340" cy="165" r="4" fill="#4facfe"/>
    <text x="340" y="162" font-size="10" fill="white" text-anchor="middle" font-family="monospace">+</text>
    <!-- W2- -->
    <circle cx="210" cy="165" r="8" fill="#f5576c" opacity="0.75" filter="url(#softglow)"/>
    <circle cx="210" cy="165" r="4" fill="#f5576c"/>
    <text x="210" y="162" font-size="10" fill="white" text-anchor="middle" font-family="monospace">−</text>

    <!-- Fermi arc top surface: connects W1+ to W1- along BZ boundary (top surface) -->
    <path d="M 210,75 C 230,30 320,30 340,75"
          fill="none" stroke="#a8edea" stroke-width="3" filter="url(#glow)" opacity="0.9"/>
    <!-- Fermi arc bottom surface: connects W2- to W2+ (bottom surface, shown dashed) -->
    <path d="M 210,165 C 230,210 320,210 340,165"
          fill="none" stroke="#f093fb" stroke-width="2.5" stroke-dasharray="5,3" filter="url(#glow)" opacity="0.8"/>

    <!-- arc arrows (direction of arc connectivity) -->
    <polygon points="295,28 283,23 288,35" fill="#a8edea" opacity="0.8"/>
    <polygon points="255,212 267,207 262,219" fill="#f093fb" opacity="0.7"/>

    <!-- k_x k_y axis labels -->
    <text x="497" y="124" font-size="12" fill="#334" font-family="monospace" font-style="italic">k_x</text>
    <text x="278" y="14" font-size="12" fill="#334" font-family="monospace" font-style="italic">k_y</text>

    <!-- arc label -->
    <text x="275" y="22" font-size="10" fill="#3a7a7a" font-family="monospace" text-anchor="middle">arc (top)</text>
    <text x="275" y="218" font-size="10" fill="#7a3a7a" font-family="monospace" text-anchor="middle">arc (bot)</text>

    <!-- panel label -->
    <text x="275" y="250" font-size="11" fill="#223" font-family="monospace" text-anchor="middle">surface BZ  ·  Fermi arcs</text>
  </g>
</svg>
