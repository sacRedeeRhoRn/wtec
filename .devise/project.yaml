  acceptance: &a1
    - "Full-finite native RGF passes the existing regression gates in
      PROJECT_SPEC: rgf_native_runner, orchestrator_json qsub/full_finite
      routing, preflight_config phase2/full_finite, kwant_block_extract,
      rgf_postprocess, and nanowire_benchmark_cluster."
    - The checked-in local parity workflow still proves full-finite correctness on
      the toy fixture, including transmission agreement with Kwant within 5e-6
      absolute error and output containing transport_results_raw.mode ==
      "full_finite" plus a runtime_cert object.
    - The actual benchmarked transport path runs through remote PBS qsub + native
      mpirun only, using the configured cluster router and producing
      remote/local runtime_cert and progress artifacts; no fork launchstyle is
      used for actual computation.
    - On the same cluster benchmark reference case, native RGF demonstrates at
      least 5x wall-time speedup versus the current Kwant baseline while
      preserving the benchmark’s existing raw/fit comparison tolerances.
  evidence_bar: Only accept success when the computed transport behavior matches
    the expected physical regime, the runtime path is the real one, and the
    reported deltas are explained rather than ignored.
  constraints:
    - Keep numerical, algorithmic, and physical explanations separate.
    - Treat benchmark and parity data as primary evidence, not supporting
      decoration.
    - Debugger owns the final real-world verification call.
