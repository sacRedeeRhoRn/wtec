goal: Complete phase-2 native RGF `full_finite` transport so it reproduces the
  checked-in Kwant finite reference, preserves the existing
  preflight/orchestrator/runtime-cert/progress behavior, runs all actual heavy
  transport computation through PBS `qsub` + native `mpirun` on the CPU cluster
  at `msj@202.30.0.129:54329` with no fork launchstyle, and demonstrates
  materially higher wall-time performance than the Kwant baseline on the same
  cluster benchmark.
acceptance: *a1
commands:
  setup:
    - .venv/bin/wtec init --validate-cluster --prepare-cluster-tools
      --prepare-cluster-pseudos --prepare-cluster-python
  dry_test:
    - .venv/bin/pytest -q tests/test_rgf_native_runner.py -k "full_finite or
      disorder_ensembles"
    - .venv/bin/pytest -q tests/test_orchestrator_json.py -k "full_finite or
      rgf_qsub_canonicalizes_axes or routes_rgf_to_native_qsub"
    - .venv/bin/pytest -q tests/test_preflight_config.py -k "full_finite or
      phase2"
    - .venv/bin/pytest -q tests/test_kwant_block_extract.py
      tests/test_rgf_postprocess.py tests/test_nanowire_benchmark_cluster.py
  restart:
    - .venv/bin/wtec init --validate-cluster --prepare-cluster-tools
      --prepare-cluster-pseudos --prepare-cluster-python
  use:
    - .venv/bin/wtec benchmark-transport
      examples/sio2_tap_sio2_small/run_small.json --output-dir
      tmp/devise_transport_benchmark --queue g4 --walltime 01:00:00
  monitor:
    - bash -lc 'test -f tmp/devise_transport_benchmark/benchmark_summary.json &&
      sed -n "1,220p" tmp/devise_transport_benchmark/benchmark_summary.json ||
      echo benchmark-summary-not-yet-created'
    - bash -lc 'find tmp/devise_transport_benchmark -type f \( -name
      "transport_runtime_cert.json" -o -name "transport_result.json" -o -name
      "kwant_reference.json" -o -name "wtec_job.log" -o -name "*.out" \) | sort
      | tail -n 40 || true'
  monitor_until:
    - tmp/devise_transport_benchmark/benchmark_summary.json exists and parses as
      JSON with status "ok" or "failed".
    - At least one native RGF transport_runtime_cert.json artifact exists under
      tmp/devise_transport_benchmark, proving cluster qsub+mpirun execution.
  monitor_timeout_seconds: 21600
git:
